services:
  #nginx service
  nginx:
    image: nginx:alpine
    ports:
      - target: 80
        published: 80
        mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - bubbles-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # Nuxt.js Frontend Service
  frontend:
    image: bubbles-frontend:latest
    networks:
      - bubbles-network
    deploy:
      replicas: 2 # You might want more for high availability
      restart_policy:
        condition: on-failure
    environment:
      NUXT_PUBLIC_API_BASE: /api
      NUXT_PUBLIC_WS_URL: /ws
      NUXT_PUBLIC_EXTERNAL_WS_URL: wss://bubbles.eacsa.us/ws
      PORT: 3001

  # Backend API Service
  api:
    image: bubbles-api:latest
    networks:
      - bubbles-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      # Mount the host path /mnt/docker-storage/bubbles/data to /app/data inside the container
      - bubbles-db:/app/data
    environment:
      # Database path inside the container
      DB_PATH: /app/data/bubbles.db # This should point to the actual DB file within the mounted volume
      PORT: 3000
    secrets:
      - SECRET_KEY
      - GEMINI_API

  # WebSocket Service
  websocket-service:
    image: bubbles-websocket:latest
    networks:
      - bubbles-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    environment:
      PORT_WS: 3003
networks:
  bubbles-network:
    driver: overlay # Required for Swarm to allow services on different nodes to communicate
volumes:
  bubbles-db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/mnt/docker-storage/bubbles/data'
secrets:
  SECRET_KEY:
    external: true
  GEMINI_API:
    external: true
