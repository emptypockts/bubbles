version: '3.8' # Use a recent version for Swarm features

services:
  # Nuxt.js Frontend Service
  frontend:
    build:
      context: . # Path to your Nuxt.js app directory containing the Dockerfile
      dockerfile: Dockerfile.frontend
    image: bubbles-frontend:latest # Name and tag for your Docker image
    ports:
      - target: 3001 # Expose frontend to host port 3001 for Cloudflared tunnel
        published: 3001
        protocol: tcp
        mode: host
    networks:
      - bubbles-network
    deploy:
      replicas: 1 # You might want more for high availability
      restart_policy:
        condition: on-failure
    environment:
      NUXT_PUBLIC_API_BASE: /api
      NUXT_PUBLIC_WS_URL: /ws
      NUXT_PUBLIC_EXTERNAL_API_BASE: https://bubbles.eacsa.us:3000/api
      NUXT_PUBLIC_EXTERNAL_WS_URL: wss://bubbles.eacsa.us:3003/ws
      PORT: 3001

  # Backend API Service
  api:
    build:
      context: ./server # Path to your backend API directory
      dockerfile: Dockerfile.api
    image: bubbles-api:latest
    # No need to expose port 3000 to the host if only Cloudflared ingress and internal services access it.
    # Cloudflared will access it via 'localhost:3000' on the host, which is then mapped to the container.
    # Or, if you use a separate Cloudflared tunnel *inside* the swarm, you'd publish it to the overlay network.
    ports:
      # Keeping this for direct host access by Cloudflared tunnel or for debugging
      - target: 3000
        published: 3000
        protocol: tcp
        mode: host
    networks:
      - bubbles-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      # Mount the host path /mnt/docker-storage/bubbles/data to /app/data inside the container
      - bubbles-db:/app/data
    environment:
      # Database path inside the container
      DB_PATH: /app/data/bubbles.db # This should point to the actual DB file within the mounted volume
      PORT: 3000
    secrets:
      - SECRET_KEY
      - GEMINI_API

  # WebSocket Service
  websocket-service:
    build:
      context: ./server # Path to your WebSocket service directory
      dockerfile: Dockerfile.ws
    image: bubbles-websocket:latest
    # No need to expose port 3003 to the host if only Cloudflared ingress and internal services access it.
    ports:
      - target: 3003                                                                   
        published: 3003
        protocol: tcp
        mode: host
    networks:
      - bubbles-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      PORT_WS: 3003
networks:
  bubbles-network:
    driver: overlay # Required for Swarm to allow services on different nodes to communicate

# No need to define a named volume if you're directly mounting a host path
# However, if you want Docker to manage the volume and place it on /mnt/docker-storage/bubbles/data,
# you could define a named volume with 'driver_opts' for local-persist:
#
volumes:
  bubbles-db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/mnt/docker-storage/bubbles/data'
secrets:
  SECRET_KEY:
    external: true
  GEMINI_API:
    external: true
