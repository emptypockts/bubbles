services:
  nginx:
    image: nginx:alpine
    deploy:
      replicas: 1
    networks:
      - bubbles-network  # ← Must be here!
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
  # Nuxt.js Frontend Service
  frontend:
    image: bubbles-frontend:latest # Name and tag for your Docker image
    deploy:
      replicas: 3
    networks:
      - bubbles-network
    environment:
      NUXT_PUBLIC_API_BASE: /api
      NUXT_PUBLIC_WS_URL: /ws
      NUXT_PUBLIC_EXTERNAL_API_BASE: https://bubbles.eacsa.us:3000/api
      NUXT_PUBLIC_EXTERNAL_WS_URL: wss://bubbles.eacsa.us:3003/ws
      PORT: 3001

  # Backend API Service
  api:
    image: bubbles-api:latest
    deploy:
      replicas: 3
    ports: 
      - 3000:3000
    networks:
      - bubbles-network
    volumes:
      # Mount the host path /mnt/docker-storage/bubbles/data to /app/data inside the container
      - bubbles-db:/app/data
    environment:
      # Database path inside the container
      DB_PATH: /app/data/bubbles.db # This should point to the actual DB file within the mounted volume
      PORT: 3000
    secrets:
      - SECRET_KEY
      - GEMINI_API

  # WebSocket Service
  websocket-service:
    image: bubbles-websocket:latest
    deploy:
      replicas: 3
    ports:
      - 3003:3003
    networks:
      - bubbles-network
    environment:
      PORT_WS: 3003

networks:
  bubbles-network:
    driver: overlay # Required for Swarm to allow services on different nodes to communicate
volumes:
  bubbles-db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/mnt/docker-storage/bubbles/data'
secrets:
  SECRET_KEY:
    external: true
  GEMINI_API:
    external: true
